name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  push:
    branches:
      - main
      - changeset-release/**
  workflow_dispatch:

jobs:
  core:
    name: core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify package
        run: bun run verify:pack

  core-required:
    name: core
    needs: core
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check core matrix result
        run: |
          if [ "${{ needs.core.result }}" != "success" ]; then
            exit 1
          fi

  changeset-check:
    runs-on: ubuntu-latest
    env:
      # Keep the required job green on release/no-changeset PRs while only running the real check for normal PRs.
      SHOULD_RUN_CHANGESET_CHECK: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'no-changeset') && !startsWith(github.head_ref, 'changeset-release/') }}
    steps:
      - name: Checkout
        if: env.SHOULD_RUN_CHANGESET_CHECK == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        if: env.SHOULD_RUN_CHANGESET_CHECK == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        if: env.SHOULD_RUN_CHANGESET_CHECK == 'true'
        run: bun install --frozen-lockfile

      - name: Check for changeset
        if: env.SHOULD_RUN_CHANGESET_CHECK == 'true'
        run: bunx changeset status --since=origin/main

  plugin-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install OpenCode
        run: npm i -g opencode-ai@1.4.3

      - name: Smoke plugin install (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$(mktemp -d)"
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_DATA_HOME="$HOME/.local/share"
          export XDG_CACHE_HOME="$HOME/.cache"

          TARBALL="$(npm pack --json | jq -r '.[0].filename')"
          SPEC="file://$(pwd)/$TARBALL"

          WORKDIR="$(mktemp -d)"
          cd "$WORKDIR"
          git init -q

          opencode plugin "$SPEC"
          CONFIG_JSON="$(opencode debug config)"
          printf 'Smoke spec: %s\n' "$SPEC"
          printf '%s\n' "$CONFIG_JSON" | jq '{plugin, plugin_origins}'
          printf '%s\n' "$CONFIG_JSON" | jq -e --arg spec "$SPEC" '.plugin_origins | any(.spec == $spec and .scope == "local")'

          CONSUMER_DIR="$(mktemp -d)"
          cd "$CONSUMER_DIR"
          npm install "$SPEC"
          bun --preload @opentui/solid/preload -e 'await import("opencode-supabase/server"); await import("opencode-supabase/tui"); console.log("packed imports ok")'

      - name: Smoke plugin install (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $tempHome = Join-Path ([IO.Path]::GetTempPath()) ([guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $tempHome -Force | Out-Null
          $env:USERPROFILE = $tempHome
          $env:APPDATA = Join-Path $tempHome 'AppData/Roaming'
          $env:LOCALAPPDATA = Join-Path $tempHome 'AppData/Local'

          $tarball = (npm pack --json | ConvertFrom-Json)[0].filename
          $resolved = (Resolve-Path $tarball).Path -replace '\\','/'
          $spec = "file:///$resolved"

          $workdir = Join-Path ([IO.Path]::GetTempPath()) ([guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $workdir -Force | Out-Null
          Set-Location $workdir
          git init -q

          opencode plugin $spec
          $config = opencode debug config | ConvertFrom-Json
          Write-Host "Smoke spec: $spec"
          $config | Select-Object plugin, plugin_origins | ConvertTo-Json -Depth 10
          $matched = $config.plugin_origins | Where-Object { $_.spec -eq $spec -and $_.scope -eq 'local' }
          if (-not $matched) { throw "plugin origin not registered for $spec" }

          $consumer = Join-Path ([IO.Path]::GetTempPath()) ([guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $consumer -Force | Out-Null
          Set-Location $consumer
          npm install $spec
          bun --preload @opentui/solid/preload -e "await import('opencode-supabase/server'); await import('opencode-supabase/tui'); console.log('packed imports ok')"
